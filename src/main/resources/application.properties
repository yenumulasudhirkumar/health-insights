server.port=${SERVER_PORT:8088}

spring.application.name=health-insights
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_MAIN_DATABASE:youtube}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=never
spring.main.banner-mode=off

insights.api-key=${INSIGHTS_API_KEY}
insights.mysql.main-database=${MYSQL_MAIN_DATABASE:youtube}
insights.mysql.health-database=${MYSQL_HEALTH_DATABASE:youtube_health_influencers}
insights.mysql.curation-database=${MYSQL_CURATION_DATABASE:health_question_mining}
