name: Deploy Health Insights API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -q test

  deploy:
    name: Deploy to VPS
    runs-on:
      - self-hosted
      - health-insights-api
    needs: test
    steps:
      - name: Deploy
        run: /root/deploy-health-insights-api.sh
