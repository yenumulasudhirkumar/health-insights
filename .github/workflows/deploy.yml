name: Deploy Health Insights API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -q test

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/health-insights-deploy
          chmod 600 ~/.ssh/health-insights-deploy
          ssh-keyscan -p "${{ secrets.VPS_PORT || 22 }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/health-insights-deploy \
            -p "${{ secrets.VPS_PORT || 22 }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "/root/deploy-health-insights-api.sh"
